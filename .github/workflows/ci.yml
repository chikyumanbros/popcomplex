name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Tape smoke test
        run: npm run test:tape

      - name: Repro smoke test
        run: npm run test:repro

      - name: Design gate
        run: npm run test:design

      - name: Build
        run: npm run build
